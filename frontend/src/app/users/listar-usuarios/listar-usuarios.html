<div class="container">
    <h1>Usuarios</h1>
    <p>total {{usuarios().length}}</p>
</div>

@if(usuarios().length == 0){
    <p>No hay usuarios</p>
} @else {
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Email</th>
                <th>Nombre</th>
                <th>Creado</th>
                <th>Actualizado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            @for(u of usuarios(); track u.id){
                <tr>
                    <td>{{u.id}}</td>
                    <td>{{u.email}}</td>
                    <td>{{u.name}}</td>
                    <td>{{u.createdAt | date: 'M/d/yy, h:mm'}}</td>
                    <td>{{u.updatedAt | date: 'M/d/yy, h:mm'}}</td>
                    <td>
                        <button (click)="editUser(u)">Editar</button>
                        <button (click)="deleteUser(u.id)">Eliminar</button>
                    </td>
                </tr>
            }
        </tbody>
    </table>
}
